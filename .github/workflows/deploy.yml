name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve BASE_PATH
        shell: bash
        run: |
          if [ -n "${{ vars.PAGES_BASE_PATH }}" ]; then
            BASE_PATH="${{ vars.PAGES_BASE_PATH }}"
          elif [[ "${GITHUB_REPOSITORY#*/}" == *.github.io ]]; then
            BASE_PATH="/"
          else
            BASE_PATH="/${GITHUB_REPOSITORY#*/}/"
          fi
          echo "BASE_PATH=${BASE_PATH}" >> "$GITHUB_ENV"
          echo "Using BASE_PATH=${BASE_PATH}"

      - name: Build
        run: npm run build
        env:
          BASE_PATH: ${{ env.BASE_PATH }}

      - name: Deploy dist to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
